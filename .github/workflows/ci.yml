name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write   # the release job creates the tag + GitHub release

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Scheduler unit tests
        run: python3 -m unittest discover -s plugins/anderson/test -v

      - name: Compile the hook
        run: python3 -m py_compile plugins/anderson/hooks/scheduler.py

      - name: Shellcheck (advisory until bin/ is fully clean)
        continue-on-error: true
        run: shellcheck -S warning plugins/anderson/bin/*.sh

      - name: Version sync (plugin.json == marketplace.json == README badges)
        run: |
          P=$(jq -r .version plugins/anderson/.claude-plugin/plugin.json)
          M=$(jq -r '.plugins[0].version' .claude-plugin/marketplace.json)
          echo "plugin.json=$P  marketplace.json=$M"
          if [ "$P" != "$M" ]; then
            echo "::error::version mismatch — bump both in sync (plugin.json=$P, marketplace.json=$M)"
            exit 1
          fi
          for R in README.md plugins/anderson/README.md; do
            B=$(grep -oE 'version-[0-9]+\.[0-9]+\.[0-9]+-blue' "$R" | head -1 | sed -E 's/version-(.*)-blue/\1/')
            echo "$R badge=$B"
            if [ "$B" != "$P" ]; then
              echo "::error::$R version badge ($B) != plugin.json ($P) — update the badge"
              exit 1
            fi
          done

      - name: Require a version bump when the plugin changes (PRs only)
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch --no-tags --depth=1 origin "$BASE_REF"
          BASE="origin/$BASE_REF"
          # Compare shippable plugin content against the PR base; tests don't count.
          if git diff --quiet "$BASE" HEAD -- plugins/anderson ':(exclude)plugins/anderson/test'; then
            echo "no shippable plugin changes — version bump not required"
            exit 0
          fi
          BASE_VER=$(git show "$BASE:plugins/anderson/.claude-plugin/plugin.json" | jq -r .version)
          HEAD_VER=$(jq -r .version plugins/anderson/.claude-plugin/plugin.json)
          echo "base=$BASE_VER  head=$HEAD_VER"
          if [ "$BASE_VER" = "$HEAD_VER" ]; then
            echo "::error::plugins/anderson changed but version not bumped (still $HEAD_VER) — bump plugin.json + marketplace.json"
            exit 1
          fi
          echo "version bumped $BASE_VER -> $HEAD_VER"

  release:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need full tag history to detect an existing release

      - name: Auto-release when plugin.json version is new
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(jq -r .version plugins/anderson/.claude-plugin/plugin.json)
          TAG="v$VERSION"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists — nothing to publish."
            exit 0
          fi
          echo "Publishing $TAG"
          gh release create "$TAG" --target "$GITHUB_SHA" --title "anderson $TAG" --generate-notes
